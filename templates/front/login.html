<!DOCTYPE html>
{% load static %}
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Digital Market Place</title>
    <link rel="shortcut icon" href="{% static 'assets/images/logo/favicon.png' %}">
    <link rel="stylesheet" href="{% static 'assets/css/bootstrap.min.css' %}">
    <link rel="stylesheet" href="{% static 'assets/css/fontawesome-all.min.css' %}">
    <link rel="stylesheet" href="{% static 'assets/css/slick.css' %}">
    <link rel="stylesheet" href="{% static 'assets/css/magnific-popup.css' %}">
    <link rel="stylesheet" href="{% static 'assets/css/line-awesome.min.css' %}">
    <link rel="stylesheet" href="{% static 'assets/css/main.css' %}">
</head>
<body>

<!--==================== Preloader Start ====================-->
<div class="loader-mask">
    <div class="loader">
        <div></div>
        <div></div>
    </div>
</div>
<!--==================== Preloader End ====================-->

<!--==================== Overlay Start ====================-->
<div class="overlay"></div>
<!--==================== Overlay End ====================-->

<!--==================== Sidebar Overlay ====================-->
<div class="side-overlay"></div>
<!--==================== Sidebar Overlay End ====================-->

<!-- ==================== Scroll to Top ==================== -->
<div class="progress-wrap">
    <svg class="progress-circle svg-content" width="100%" height="100%" viewBox="-1 -1 102 102">
        <path d="M50,1 a49,49 0 0,1 0,98 a49,49 0 0,1 0,-98" />
    </svg>
</div>
<!-- ==================== Scroll to Top End ==================== -->

<!-- ==================== Mobile Menu ==================== -->
<div class="mobile-menu d-lg-none d-block">
    <button type="button" class="close-button"> <i class="las la-times"></i> </button>
    <div class="mobile-menu__inner">
        <a href="{% url 'index' %}" class="mobile-menu__logo">
            <img src="{% static 'assets/images/logo/logo.png' %}" alt="Logo">
        </a>
        <div class="mobile-menu__menu">
            <ul class="nav-menu flx-align nav-menu--mobile">
                <li class="nav-menu__item">
                    <a href="{% url 'index' %}" class="nav-menu__link">Home</a>
                </li>
                <li class="nav-menu__item">
                    <a href="{% url 'index' %}" class="nav-menu__link">Products</a>
                </li>
                <li class="nav-menu__item">
                    <a href="{% url 'register' %}" class="nav-menu__link">Register</a>
                </li>
                <li class="nav-menu__item">
                    <a href="{% url 'login' %}" class="nav-menu__link">Login</a>
                </li>
            </ul>

            <div class="header-right__inner d-lg-none my-3 gap-1 d-flex flx-align">
                <a href="{% url 'register' %}" class="btn btn-main pill">
                    <span class="icon-left icon">
                        <img src="{% static 'assets/images/icons/user.svg' %}" alt="">
                    </span>
                    Create Account
                </a>
                <div class="language-select flx-align select-has-icon">
                    <img src="{% static 'assets/images/icons/globe.svg' %}" alt="" class="globe-icon">
                    <select class="select py-0 ps-2 border-0 fw-500">
                        <option value="1">Eng</option>
                        <option value="2">Bn</option>
                        <option value="3">Eur</option>
                        <option value="4">Urd</option>
                    </select>
                </div>
            </div>

        </div>
    </div>
</div>
<!-- ==================== Mobile Menu End ==================== -->


<!-- ================================== Account Page ================================== -->
<section class="account d-flex">
    <div class="account__left d-md-flex d-none flx-align section-bg position-relative z-index-1 overflow-hidden">
        <div class="account-thumb">
            <div class="statistics animation bg-main text-center">
                <h5 class="statistics__amount text-white">50k</h5>
                <span class="statistics__text text-white font-14">Customers</span>
            </div>
        </div>
    </div>

    <div class="account__right padding-y-120 flx-align">
        <div class="account-content">

            <a href="{% url 'index' %}" class="logo mb-64">
                <img src="{% static 'assets/images/logo/logo.png' %}" alt="Logo">
            </a>

            <h4 class="account-content__title mb-48 text-capitalize">Welcome Back!</h4>

            <!-- ✅ Xato xabarlari -->
            {% if messages %}
                {% for message in messages %}
                    <div class="alert alert-{{ message.tags }} alert-dismissible fade show mb-3" role="alert">
                        {{ message }}
                        <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
                    </div>
                {% endfor %}
            {% endif %}

            <form action="{% url 'login' %}" method="POST">
                {% csrf_token %}
                <div class="row gy-4">

                    <div class="col-12">
                        <label for="username" class="form-label mb-2 font-18 font-heading fw-600">Username</label>
                        <div class="position-relative">
                            <input
                                type="text"
                                name="username"
                                class="common-input common-input--bg common-input--withIcon"
                                id="username"
                                placeholder="Username yoki Email"
                                required
                            >
                            <span class="input-icon">
                                <img src="{% static 'assets/images/icons/envelope-icon.svg' %}" alt="">
                            </span>
                        </div>
                    </div>

                    <div class="col-12">
                        <label for="your-password" class="form-label mb-2 font-18 font-heading fw-600">Password</label>
                        <div class="position-relative">
                            <input
                                type="password"
                                name="password"
                                class="common-input common-input--bg common-input--withIcon"
                                id="your-password"
                                placeholder="6+ characters, 1 Capital letter"
                                required
                            >
                            <span class="input-icon toggle-password cursor-pointer" id="#your-password">
                                <img src="{% static 'assets/images/icons/lock-icon.svg' %}" alt="">
                            </span>
                        </div>
                    </div>

                    <div class="col-12">
                        <button type="submit" class="btn btn-main btn-lg w-100 pill">Sign In</button>
                    </div>

                    <div class="col-12 text-center">
                        <p class="font-14">
                            Akkauntingiz yo'qmi?
                            <a href="{% url 'register' %}" class="text-main fw-600">Ro'yxatdan o'ting</a>
                        </p>
                    </div>

                </div>
            </form>

        </div>
    </div>
</section>
<!-- ================================== Account Page End ================================== -->

<!-- jQuery -->
<script src="{% static 'assets/js/jquery-3.7.1.min.js' %}"></script>
<!-- Bootstrap Bundle -->
<script src="{% static 'assets/js/boostrap.bundle.min.js' %}"></script>
<!-- CountDown -->
<script src="{% static 'assets/js/countdown.js' %}"></script>
<!-- Counter Up -->
<script src="{% static 'assets/js/counterup.min.js' %}"></script>
<!-- Slick -->
<script src="{% static 'assets/js/slick.min.js' %}"></script>
<!-- Magnific Popup -->
<script src="{% static 'assets/js/jquery.magnific-popup.js' %}"></script>
<!-- Apex Chart -->
<script src="{% static 'assets/js/apexchart.js' %}"></script>
<!-- Main JS -->
<script src="{% static 'assets/js/main.js' %}"></script>

</body>
</html>
